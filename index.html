<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Clone</title>
    <link rel="stylesheet" href="style/footer.css" />
    <link rel="stylesheet" href="style/general.css" />
    <link rel="stylesheet" href="style/layout.css" />
    <link rel="stylesheet" href="style/button-container.css" />
    <link rel="stylesheet" href="style/nav-bar.css" />
    <link rel="stylesheet" href="style/info.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="cover-pic-container">
      <img class="cover-pic" src="picture/cover-pic.png" alt="" />
      <div class="icon-on-cover">
        <img
          class="hamburger-menu-icon"
          src="icons/hamburger-menu.svg"
          alt=""
        />
        <img class="edit-icon" src="icons/edit.svg" alt="" />
        <img class="search-icon" src="icons/search.svg" alt="" />
        <img class="pending-icon" src="icons/pending.svg" alt="" />
        <img class="camera-icon" src="icons/camera.svg" alt="" />
        <img class="profile-pic" src="picture/profile-pic.png" alt="" />
        <div class="note-share">What's on your mind?</div>
        <div class="camera-div">
          <img class="camera-icon-on-profile" src="icons/camera.svg" alt="" />
        </div>
        <div class="id-info">
          <p class="id-name">Ashraful Islam Ullas</p>
          <p class="friend-info">
            28 friends &#183; 3 following &#183; 6 posts
          </p>
        </div>
        <div class="keyboard-down-div">
          <img class="keyboard-down" src="icons/keyboard-down.svg" alt="" />
        </div>
      </div>
    </div>

    <div class="bio">Sup?</div>
    <div class="mutual-friends">
      <img class="shuvo-picture" src="picture/shuvo.png" alt="" />
      <img class="tanvir-picture" src="picture/tanvir.png" alt="" />
      <img class="limon-picture" src="picture/limon.png" alt="" />
      <img class="more-horizontal" src="icons/more-horizontal.svg" alt="" />
      <p class="mutual-friends-text">Friends with things in common</p>
    </div>

    <div class="two-button-container">
      <div class="first-button">
        <img class="add-story" src="icons/add-story.svg" alt="" />
        <p class="add-story-text">Add to story</p>
      </div>
      <div class="second-button">
        <img class="edit-profile" src="icons/edit-profile.svg" alt="" />
        <p class="edit-profile-text">Edit profile</p>
      </div>
    </div>

    <div class="nav-bar">
      <div class="all">All</div>
      <div class="photos">Photos</div>
      <div class="reels">Reels</div>
    </div>

    <div class="info-details-container">
      <p class="info-details">Personal details</p>
      <img class="info-details-edit-icon" src="icons/edit.svg" alt="" />
    </div>

    <div class="birth-date">
      <img class="birthday" src="icons/birthday.svg" alt="" />
      <p class="birth-date-text">8 May</p>
    </div>
    <div class="user-gender">
      <img class="gender" src="icons/gender.svg" alt="" />
      <p class="user-gender-text">he/him</p>
    </div>

    <div class="info-details-container">
      <p class="info-details">Education</p>
      <img class="info-details-edit-icon" src="icons/edit.svg" alt="" />
    </div>


    
    <div class="footer">
      <img class="home" src="icons/home.svg" alt="" />
      <img class="reel-bottom" src="icons/reel-bottom.svg" alt="" />
      <img class="friend" src="icons/friend.svg" alt="" />
      <img class="groups" src="icons/groups.svg" alt="" />
      <img class="notifications" src="icons/notifications.svg" alt="" />
      <img class="account" src="icons/account.svg" alt="" />
    </div>
  </body>
</html>
